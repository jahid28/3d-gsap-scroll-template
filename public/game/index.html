            var basePath = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);

                        window.GameMaker_Init();
                        console.log('GameMaker_Init completed');
                    } catch(e) {
                        console.error('GameMaker initialization error:', e);
                        document.getElementById('canvas').style.display = 'none';
                        document.getElementById('gm4html5_div_id').innerHTML = 
                            '<div style="color: white; text-align: center; padding: 20px;">Game failed to initialize: ' + e.message + '</div>';
                    }
                } else {
                    console.error('GameMaker_Init function not found after script load');
                    document.getElementById('canvas').style.display = 'none';
                    document.getElementById('gm4html5_div_id').innerHTML = 
                        '<div style="color: white; text-align: center; padding: 20px;">GameMaker_Init function not found</div>';
                }
            };
            
            script.onerror = function(e) {
                console.error('Failed to load GameMaker script:', e);
                console.error('Script src was:', script.src);
                document.getElementById('canvas').style.display = 'none';
                document.getElementById('gm4html5_div_id').innerHTML =
